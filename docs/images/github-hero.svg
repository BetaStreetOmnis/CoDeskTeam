<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081226"/>
      <stop offset="0.55" stop-color="#0F1F3D"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="120" x2="760" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#48C4FF"/>
      <stop offset="0.55" stop-color="#7B6CFF"/>
      <stop offset="1" stop-color="#2BE4B8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#132746" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0D1B33" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#02101F" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1330" cy="130" r="250" fill="#3B82F6" fill-opacity="0.12"/>
  <circle cx="1230" cy="720" r="260" fill="#8B5CF6" fill-opacity="0.12"/>
  <circle cx="340" cy="780" r="220" fill="#14B8A6" fill-opacity="0.10"/>

  <rect x="88" y="84" width="210" height="38" rx="19" fill="#0D1F37" stroke="#2C5EFF" stroke-opacity="0.65"/>
  <text x="118" y="109" fill="#91B4FF" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">Enterprise OpenClaw</text>

  <text x="88" y="205" fill="white" font-size="68" font-family="Inter, Arial, sans-serif" font-weight="800">JetLinks AI</text>
  <text x="88" y="268" fill="#D9E7FF" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="600">Team delivery workspace for chat, projects, requirements,</text>
  <text x="88" y="312" fill="#D9E7FF" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="600">documents, pipelines, and OpenClaw operations.</text>

  <rect x="88" y="360" width="632" height="124" rx="28" fill="#0A1830" stroke="#254A80" stroke-opacity="0.8"/>
  <circle cx="132" cy="405" r="12" fill="#2BE4B8"/>
  <text x="160" y="412" fill="#F4F8FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Why it stands out on GitHub</text>
  <text x="132" y="450" fill="#B8CAE7" font-size="20" font-family="Inter, Arial, sans-serif">• Team skills + requirement board + project delivery in one AI workspace</text>
  <text x="132" y="482" fill="#B8CAE7" font-size="20" font-family="Inter, Arial, sans-serif">• Enterprise-ready OpenClaw ops, self-hosted control, mobile-friendly UI</text>

  <g filter="url(#shadow)">
    <rect x="786" y="112" width="728" height="646" rx="36" fill="#0A162B" stroke="#23406E"/>
    <rect x="812" y="138" width="676" height="62" rx="20" fill="#0E213E"/>
    <circle cx="852" cy="169" r="9" fill="#FF6B6B"/>
    <circle cx="882" cy="169" r="9" fill="#FFB84D"/>
    <circle cx="912" cy="169" r="9" fill="#30D158"/>
    <text x="950" y="176" fill="#DCE9FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">CoDeskTeam · Enterprise OpenClaw Workspace</text>

    <rect x="832" y="224" width="300" height="160" rx="26" fill="url(#card)" stroke="#35598E"/>
    <text x="860" y="268" fill="#F4F8FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Team Skills</text>
    <text x="860" y="306" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Shared prompts and role skills</text>
    <text x="860" y="336" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Delivery playbooks</text>
    <text x="860" y="366" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Cross-team reuse</text>

    <rect x="1162" y="224" width="300" height="160" rx="26" fill="url(#card)" stroke="#35598E"/>
    <text x="1190" y="268" fill="#F4F8FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Requirements Board</text>
    <text x="1190" y="306" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Intake → Review → Delivery</text>
    <text x="1190" y="336" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Owners and priorities</text>
    <text x="1190" y="366" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Team-visible status</text>

    <rect x="832" y="410" width="300" height="160" rx="26" fill="url(#card)" stroke="#35598E"/>
    <text x="860" y="454" fill="#F4F8FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Project Delivery</text>
    <text x="860" y="492" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Workspace & repo switching</text>
    <text x="860" y="522" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Files, docs, and history</text>
    <text x="860" y="552" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Admin-ready governance</text>

    <rect x="1162" y="410" width="300" height="160" rx="26" fill="url(#card)" stroke="#35598E"/>
    <text x="1190" y="454" fill="#F4F8FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">OpenClaw Ops</text>
    <text x="1190" y="492" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Gateway probe & sync</text>
    <text x="1190" y="522" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Channel / plugin / skill CRUD</text>
    <text x="1190" y="552" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">• Team-scoped registries</text>

    <rect x="832" y="596" width="630" height="136" rx="26" fill="#0E213E" stroke="#35598E"/>
    <rect x="860" y="626" width="176" height="54" rx="18" fill="url(#accent)"/>
    <text x="893" y="660" fill="white" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="800">AI+ Pipelines</text>
    <text x="1080" y="646" fill="#EAF2FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Vision · Media · Content · Office · Full</text>
    <text x="1080" y="678" fill="#AFC2E6" font-size="18" font-family="Inter, Arial, sans-serif">Generate images, docs, proposals, prototypes, and operational artifacts</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="116" y="560" width="252" height="238" rx="30" fill="#0A162B" stroke="#23406E"/>
    <text x="146" y="608" fill="#F4F8FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Mobile-ready</text>
    <rect x="150" y="636" width="184" height="126" rx="24" fill="#102342"/>
    <rect x="174" y="662" width="136" height="16" rx="8" fill="#274B84"/>
    <rect x="174" y="692" width="110" height="12" rx="6" fill="#9FB4D7" fill-opacity="0.75"/>
    <rect x="174" y="716" width="126" height="12" rx="6" fill="#9FB4D7" fill-opacity="0.55"/>
    <rect x="174" y="740" width="88" height="12" rx="6" fill="#9FB4D7" fill-opacity="0.55"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="402" y="560" width="290" height="238" rx="30" fill="#0A162B" stroke="#23406E"/>
    <text x="432" y="608" fill="#F4F8FF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Outputs that ship</text>
    <text x="432" y="652" fill="#B8CAE7" font-size="20" font-family="Inter, Arial, sans-serif">PPTX · Quote · Inspection Sheet</text>
    <text x="432" y="686" fill="#B8CAE7" font-size="20" font-family="Inter, Arial, sans-serif">Prototype HTML · Poster · Long image</text>
    <text x="432" y="732" fill="#7FDBFF" font-size="18" font-family="Inter, Arial, sans-serif">Built for teams who need real deliverables,</text>
    <text x="432" y="760" fill="#7FDBFF" font-size="18" font-family="Inter, Arial, sans-serif">not just AI chat demos.</text>
  </g>
</svg>
